name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          FAILED=0
          while IFS= read -r f; do
            if ! clang-format-18 --dry-run --Werror "$f" 2>&1; then
              FAILED=1
            fi
          done < <(find Source Tests -name '*.cpp' -o -name '*.h' | sort)

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::Format check failed. Run ./scripts/format.sh locally to fix."
            exit 1
          fi
          echo "All files formatted correctly."

  lint:
    name: Lint (clang-tidy)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy-18 cmake ninja-build \
            libasound2-dev libfreetype-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libwebkit2gtk-4.1-dev

      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTS=OFF

      - name: Run clang-tidy on DSP sources
        run: |
          FILES=$(find Source/DSP -name '*.cpp' | sort)
          echo "Linting: $FILES"
          clang-tidy-18 --header-filter='Source/.*\.h$' -p build --warnings-as-errors='*' $FILES

  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-24.04, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build \
            libasound2-dev libfreetype-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libwebkit2gtk-4.1-dev

      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -A x64 -DBUILD_TESTS=ON

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build --config Release 2>&1 | tee build.log

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release 2>&1 | Tee-Object -FilePath build.log
        shell: pwsh

      - name: Check for warnings in Source (Unix)
        if: runner.os != 'Windows'
        run: |
          if grep -i "warning:" build.log | grep "hk-enhancer/Source"; then
            echo "::error::Build warnings found in Source/"
            exit 1
          fi
          echo "No warnings found in Source/"

      - name: Check for warnings in Source (Windows)
        if: runner.os == 'Windows'
        run: |
          $warnings = Select-String -Path build.log -Pattern "warning:" | Select-String -Pattern "hk-enhancer[\\/]Source"
          if ($warnings) {
            Write-Error "Build warnings found in Source/"
            $warnings | ForEach-Object { Write-Host $_.Line }
            exit 1
          }
          Write-Host "No warnings found in Source/"
        shell: pwsh

      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: ./build/HKEnhancerTests --reporter console

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: |
          $exe = Get-ChildItem -Path build -Recurse -Filter "HKEnhancerTests.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "HKEnhancerTests.exe not found"; exit 1 }
          Write-Host "Running $($exe.FullName)"
          & $exe.FullName --reporter console
        shell: pwsh
